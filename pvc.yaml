apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-data-pvc
  namespace: team-storage-patterns
spec:
  accessModes:
    - ReadWriteOnce  # ← Single pod can read/write
  resources:
    requests:
      storage: 1Gi
  # Optional: specify storage class
  storageClassName:  null  # ← Use default storage class if not specified