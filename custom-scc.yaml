apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: custom-netbind-scc
allowHostDirVolumePlugin: true
allowHostIPC: false
allowHostNetwork: false
allowHostPID: false
allowHostPorts: false
allowPrivilegeEscalation: false
allowPrivilegedContainer: false
allowedCapabilities:
  - NET_BIND_SERVICE        # Allows binding to ports <1024 WITHOUT being root
defaultAddCapabilities: null
fsGroup:
  type: MustRunAs
  ranges:
    - min: 5000
      max: 6000
priority: 10                # Higher than restricted-v2 = preferred when multiple match
readOnlyRootFilesystem: false
requiredDropCapabilities:
  - ALL
runAsUser:
  type: MustRunAsRange
seLinuxContext:
  type: MustRunAs
supplementalGroups:
  type: RunAsAny
users: []
groups: []
spec:
  securityContext:
    runAsUser: 1001          # must be within the cluster's range (check with `oc get scc restricted-v2 -o yaml | grep runAsUser`)
    fsGroup: 5000    
allowHostDirVolumePluginvolumes:
  - configMap
  - emptyDir
  - secret
  - persistentVolumeClaim
  - hostPath   # add this